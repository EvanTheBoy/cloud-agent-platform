<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Agent Platform</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel submit-panel">
        <div>
          <h1>Cloud Agent Platform</h1>
          <p>Submit an autonomous repo task and watch the cloud agent execute it in an isolated workspace.</p>
        </div>
        <form id="job-form">
          <textarea id="task" name="task" rows="5">Read this repository, find all TODO comments, and generate a concise report grouped by file.</textarea>
          <button type="submit">Run Agent</button>
        </form>
      </section>

      <section class="grid">
        <aside class="panel">
          <div class="panel-header">
            <h2>Jobs</h2>
            <button id="refresh" type="button">Refresh</button>
          </div>
          <div id="jobs" class="job-list"></div>
        </aside>

        <section class="panel detail-panel">
          <div class="panel-header">
            <h2>Run Detail</h2>
            <span id="status" class="status">idle</span>
          </div>
          <pre id="detail">No job selected.</pre>
        </section>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
